<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>우진만세 · 예약 프로토타입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --text:#3a2e2a; --textMid:#8a7a72; --textMuted:#b6a89f; --open:#3a9e6e;
    --primary:#ec7f72; --primaryDk:#d35f50; --primarySoft:#fce9e4;
    --surface:#fdf7f5; --track:#f6e2db; --border:#efe2dc; --borderSoft:#f5ebe6; --card:#fff;
    --r:14px; --rbtn:12px;
    --ig:linear-gradient(45deg,#feda75 5%,#fa7e1e 28%,#d62976 55%,#962fbf 78%,#4f5bd5 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Noto Sans KR',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--text);background:#e7e2dc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:28px;}

  /* 디바이스 */
  .phone{background:var(--surface);border-radius:46px;padding:12px;box-shadow:0 36px 70px rgba(60,40,30,.22),0 0 0 1px rgba(0,0,0,.08);}
  .screen{background:var(--surface);border-radius:34px;overflow:hidden;position:relative;width:392px;height:min(840px,calc(100vh - 80px));}
  .island{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:108px;height:30px;border-radius:16px;background:#1a1410;z-index:20;}
  .sb{position:absolute;top:0;left:0;right:0;z-index:19;display:flex;justify-content:space-between;align-items:center;padding:15px 28px 6px;font-size:13px;font-weight:600;pointer-events:none;}
  .sb .rt{display:flex;gap:5px;}.sb .rt i{width:5px;height:5px;border-radius:50%;background:var(--text);display:block;}

  /* 화면 전환 */
  .page{position:absolute;inset:0;background:var(--surface);}
  .page.fwd{animation:slideR .28s cubic-bezier(.3,.7,.3,1);}
  .page.back{animation:slideL .28s cubic-bezier(.3,.7,.3,1);}
  @keyframes slideR{from{transform:translateX(100%);}to{transform:none;}}
  @keyframes slideL{from{transform:translateX(-100%);}to{transform:none;}}

  .scroll{height:100%;overflow:auto;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}

  .ph{background:repeating-linear-gradient(135deg,#f2e6e0 0 11px,#ede0d7 11px 22px);display:flex;align-items:center;justify-content:center;}
  .ph span{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:#c2ab9f;}
  .ph.b{background:repeating-linear-gradient(135deg,#efe4f0 0 11px,#e9dcea 11px 22px);}
  .ph.c{background:repeating-linear-gradient(135deg,#e9ece4 0 11px,#e2e6da 11px 22px);}

  /* 상단 네비 (예약 화면들) */
  .nav{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;align-items:center;padding:48px 10px 12px;background:var(--surface);border-bottom:1px solid var(--borderSoft);}
  .nav .back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:11px;}
  .nav .ttl{font-size:16px;font-weight:600;letter-spacing:-.02em;}
  .nav .step{margin-left:auto;margin-right:8px;font-size:12.5px;color:var(--textMuted);font-variant-numeric:tabular-nums;}

  /* ===== 홈 ===== */
  .gwrap{padding-top:40px;}
  .gallery{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 14px;scrollbar-width:none;}
  .gallery::-webkit-scrollbar{display:none;}
  .gcard{flex:0 0 88%;scroll-snap-align:center;height:238px;border-radius:16px;position:relative;overflow:hidden;}
  .gcard .ovl{position:absolute;inset:0;background:linear-gradient(to top,rgba(28,16,12,.5) 0%,transparent 42%);}
  .gcard .id{position:absolute;left:16px;bottom:15px;color:#fff;}
  .gcard .id .nm{font-size:22px;font-weight:700;letter-spacing:-.03em;text-shadow:0 1px 6px rgba(0,0,0,.35);}
  .gcard .cnt{position:absolute;right:12px;top:12px;font-size:11px;font-weight:600;color:#fff;background:rgba(20,12,10,.45);backdrop-filter:blur(4px);border-radius:20px;padding:5px 11px;}
  .gacts{position:absolute;left:12px;top:12px;display:flex;gap:7px;}
  .gacts button{width:38px;height:38px;border-radius:12px;background:rgba(20,12,10,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .gdots{display:flex;justify-content:center;gap:5px;padding:12px 0 2px;}
  .gdots i{width:6px;height:6px;border-radius:50%;background:var(--track);display:block;cursor:pointer;transition:width .2s;}
  .gdots i.on{width:18px;border-radius:3px;background:var(--primary);}

  .body{padding:12px 16px 6px;display:flex;flex-direction:column;gap:16px;}
  .pbar{display:flex;align-items:center;gap:12px;}
  .pbar .av{width:50px;height:50px;border-radius:50%;flex-shrink:0;}
  .pbar .who{min-width:0;flex:1;}
  .pbar .nm{font-size:17px;font-weight:600;letter-spacing:-.02em;}
  .pbar .sub{font-size:13px;color:var(--textMuted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .srow{display:flex;align-items:flex-start;gap:10px;}
  .socials{display:flex;gap:9px;}
  .socials .chip{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 9px rgba(60,40,30,.16);cursor:pointer;border:none;}
  .hours{margin-left:auto;position:relative;}
  .hours .top{display:inline-flex;align-items:center;gap:7px;height:42px;padding:0 14px;border:1px solid var(--border);border-radius:13px;background:var(--card);cursor:pointer;user-select:none;font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;}
  .hours .top .od{width:8px;height:8px;border-radius:50%;background:var(--open);display:block;}
  .hours .top .chev{color:var(--textMuted);font-size:12px;transition:transform .25s;}
  .hours.open .top .chev{transform:rotate(180deg);}
  .hours .list{position:absolute;right:0;top:50px;z-index:5;width:238px;animation:hdrop .18s ease;}
  @keyframes hdrop{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
  .hours .inner{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:5px 15px;box-shadow:0 16px 34px rgba(60,40,30,.18);}
  .hours .hrow{display:flex;align-items:center;font-size:13px;padding:9px 0;}
  .hours .hrow + .hrow{border-top:1px solid var(--borderSoft);}
  .hours .hrow .d{width:66px;color:var(--textMid);}
  .hours .hrow .t{color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .hours .hrow.today .d,.hours .hrow.today .t{color:var(--primaryDk);font-weight:600;}
  .hours .hrow.off .t{color:var(--textMuted);}

  .pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .pcard .pr{display:flex;align-items:center;padding:13px 17px;cursor:pointer;}
  .pcard .pr + .pr{border-top:1px solid var(--borderSoft);}
  .pcard .pr .n{font-size:15px;font-weight:500;letter-spacing:-.02em;white-space:nowrap;}
  .pcard .pr .d{font-size:12.5px;color:var(--textMuted);margin-left:8px;white-space:nowrap;overflow:hidden;}
  .pcard .pr .p{margin-left:auto;font-size:16px;font-weight:600;color:var(--primaryDk);font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:8px;}
  .pcard .slots{border-top:6px solid var(--surface);padding:15px 17px 16px;}
  .pcard .slots .sh{display:flex;align-items:baseline;}
  .pcard .slots .sh .b{font-size:14px;font-weight:600;letter-spacing:-.02em;}
  .pcard .slots .sh .left{margin-left:auto;font-size:12.5px;color:var(--textMid);white-space:nowrap;}
  .pcard .slots .sh .left b{color:var(--primaryDk);font-weight:600;}
  .pcard .slots .chips{display:flex;gap:9px;margin-top:13px;}
  .pcard .slots .chip{font-size:14.5px;font-weight:500;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 0;flex:1;text-align:center;font-variant-numeric:tabular-nums;cursor:pointer;}
  .pcard .slots .chip.soon{color:var(--primaryDk);border-color:#f0c5ba;background:#fdeee9;font-weight:600;}
  .pcard .full{display:flex;align-items:center;justify-content:center;gap:5px;padding:14px;border-top:1px solid var(--borderSoft);font-size:13.5px;color:var(--textMid);cursor:pointer;}

  /* ===== 하단 도크 ===== */
  .dock{position:absolute;bottom:0;left:0;right:0;z-index:7;padding:10px 16px 16px;background:rgba(253,247,245,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--border);}
  .dock .cpn{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text);padding:4px 2px 10px;white-space:nowrap;}
  .dock .cpn .ctag{font-size:11px;font-weight:700;color:#fff;background:var(--primary);border-radius:6px;padding:3px 7px;}
  .dock .cpn .x{color:var(--textMuted);margin-left:auto;}
  .cta{width:100%;padding:17px 0;border:none;border-radius:var(--rbtn);background:var(--primary);color:#fff;font-family:inherit;font-size:16.5px;font-weight:700;letter-spacing:-.02em;cursor:pointer;box-shadow:0 6px 16px rgba(236,127,114,.38);transition:opacity .15s,background .15s;}
  .cta:disabled{background:#e8d9d2;color:#b9a89f;box-shadow:none;cursor:not-allowed;}
  .dock .sumline{display:flex;align-items:center;gap:8px;padding:4px 4px 11px;font-size:13px;}
  .dock .sumline .k{color:var(--textMuted);white-space:nowrap;}
  .dock .sumline .v{font-weight:600;letter-spacing:-.02em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dock .sumline .amt{margin-left:auto;font-size:16px;font-weight:700;color:var(--primaryDk);white-space:nowrap;}

  /* ===== 예약 화면(시술/날짜/시간) ===== */
  .pgscroll{height:100%;overflow:auto;scrollbar-width:none;padding:104px 16px 130px;display:flex;flex-direction:column;gap:24px;}
  .pgscroll::-webkit-scrollbar{display:none;}
  .sec h3{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.02em;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
  .sec h3 .no{width:21px;height:21px;border-radius:50%;background:var(--primarySoft);color:var(--primaryDk);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .svc{display:flex;align-items:center;gap:13px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:15px 16px;cursor:pointer;transition:border-color .15s,background .15s;}
  .svc + .svc{margin-top:10px;}
  .svc.sel{border-color:var(--primary);background:#fffaf8;}
  .svc .radio{width:21px;height:21px;border-radius:50%;border:2px solid var(--track);flex-shrink:0;position:relative;transition:border-color .15s;}
  .svc.sel .radio{border-color:var(--primary);}
  .svc.sel .radio::after{content:"";position:absolute;inset:3.5px;border-radius:50%;background:var(--primary);}
  .svc .info .n{font-size:15.5px;font-weight:600;letter-spacing:-.02em;}
  .svc .info .d{font-size:12.5px;color:var(--textMuted);margin-top:3px;}
  .svc .price{margin-left:auto;font-size:16px;font-weight:700;color:var(--primaryDk);font-variant-numeric:tabular-nums;white-space:nowrap;}

  .dstrip{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .dstrip::-webkit-scrollbar{display:none;}
  .dcell{flex:0 0 56px;height:78px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:border-color .15s,background .15s;}
  .dcell .dw{font-size:12px;color:var(--textMid);}
  .dcell .dn{font-size:18px;font-weight:700;letter-spacing:-.02em;}
  .dcell .tag{font-size:9.5px;font-weight:700;color:var(--primaryDk);}
  .dcell.sel{border-color:var(--primary);background:var(--primary);}
  .dcell.sel .dw,.dcell.sel .dn,.dcell.sel .tag{color:#fff;}
  .dcell.off{background:var(--surface);opacity:.5;cursor:not-allowed;}
  .dcell.off .dn{color:var(--textMuted);font-weight:500;}

  .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .tcell{padding:13px 0;text-align:center;font-size:15px;font-weight:500;border-radius:11px;border:1.5px solid var(--border);background:var(--card);font-variant-numeric:tabular-nums;cursor:pointer;transition:border-color .15s,background .15s,color .15s;}
  .tcell.sel{border-color:var(--primary);background:var(--primary);color:#fff;font-weight:600;}
  .tcell.off{background:var(--surface);color:var(--textMuted);text-decoration:line-through;cursor:not-allowed;}
  .hint{font-size:12.5px;color:var(--textMuted);text-align:center;}

  /* ===== 정보 입력 ===== */
  .field{display:flex;flex-direction:column;gap:8px;}
  .field + .field{margin-top:16px;}
  .field label{font-size:13.5px;font-weight:600;letter-spacing:-.02em;}
  .field label .opt{color:var(--textMuted);font-weight:400;margin-left:5px;}
  .field input,.field textarea{font-family:inherit;font-size:14.5px;color:var(--text);background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:13px 14px;width:100%;outline:none;transition:border-color .15s;}
  .field input:focus,.field textarea:focus{border-color:var(--primary);}
  .field textarea{resize:none;height:84px;line-height:1.5;}
  .frow{display:flex;gap:10px;}.frow .field{flex:1;}

  .cpnrow{display:flex;align-items:center;gap:12px;background:linear-gradient(110deg,#fff5f2,#fdeee9);border:1px solid #f6d8cf;border-radius:var(--r);padding:14px 16px;}
  .cpnrow .ic{width:38px;height:38px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(60,40,30,.1);}
  .cpnrow .t{font-size:14px;font-weight:600;letter-spacing:-.02em;}
  .cpnrow .s{font-size:11.5px;color:var(--textMid);margin-top:2px;}
  .sw{margin-left:auto;width:48px;height:28px;border-radius:16px;background:var(--track);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
  .sw.on{background:var(--primary);}
  .sw .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .sw.on .knob{left:23px;}

  .pay{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:5px 17px;}
  .pay .py{display:flex;align-items:center;font-size:14px;padding:12px 0;}
  .pay .py + .py{border-top:1px solid var(--borderSoft);}
  .pay .py .k{color:var(--textMid);}
  .pay .py .v{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:500;}
  .pay .py .v.disc{color:var(--primaryDk);}
  .pay .py.total .k{font-weight:700;font-size:15px;color:var(--text);}
  .pay .py.total .v{font-weight:700;font-size:18px;color:var(--primaryDk);}
  .paynote{font-size:12px;color:var(--textMuted);text-align:center;margin-top:12px;line-height:1.5;}

  /* ===== 완료 ===== */
  .done{height:100%;display:flex;flex-direction:column;align-items:center;padding:120px 24px 24px;text-align:center;}
  .done .ic{width:84px;height:84px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(236,127,114,.4);animation:pop .4s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  .done h2{font-size:23px;font-weight:700;letter-spacing:-.03em;margin-top:22px;}
  .done .lead{font-size:14px;color:var(--textMid);margin-top:9px;line-height:1.6;}
  .rcard{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 18px;margin-top:28px;text-align:left;}
  .rcard .ry{display:flex;align-items:center;font-size:14px;padding:13px 0;}
  .rcard .ry + .ry{border-top:1px solid var(--borderSoft);}
  .rcard .ry .k{color:var(--textMuted);width:62px;flex-shrink:0;}
  .rcard .ry .v{font-weight:600;letter-spacing:-.02em;}
  .rcard .ry .v.amt{color:var(--primaryDk);}
  .btnrow{display:flex;gap:10px;width:100%;}
  .btn{flex:1;padding:16px 0;border-radius:var(--rbtn);font-family:inherit;font-size:15.5px;font-weight:700;letter-spacing:-.02em;cursor:pointer;border:none;}
  .btn.ghost{background:var(--card);border:1px solid var(--border);color:var(--text);}
  .btn.primary{background:var(--primary);color:#fff;box-shadow:0 6px 16px rgba(236,127,114,.38);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="proto/icons.jsx"></script>
<script type="text/babel" src="proto/screens.jsx"></script>
<script type="text/babel" src="proto/app.jsx"></script>
</body>
</html>
